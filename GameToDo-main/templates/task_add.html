{% extends "layout.html" %}
{% block title %}
タスク追加
{% endblock %}
{% block body %}
    <h1>新しいタスクを追加</h1>

    <form action="{{ url_for('task.add') }}" method="post">
        <label> タスク名: <input type="text" id="name" name="name"></label><br>
        <label> 難易度 (1〜5):
            <select id="difficulty" name="difficulty" required>
                <option value="1">1 (簡単)</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5 (難しい)</option>
            </select>
        </label><br>
        <label> 期限: </label><br>
        <input type="date" id="limit" name="limit"></label><br>
        <button type="submit" class="common_button_solo">追加</button>
    </form>
{% endblock %}
